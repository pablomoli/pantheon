services:
  sandbox:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - samples:/tmp/samples
      - db:/app/data
    environment:
      - PANTHEON_DB_PATH=/app/data/pantheon.db
      - SANDBOX_API_URL=http://sandbox:9000
    networks:
      - pantheon
    env_file: ../.env
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_SANDBOX_URL: http://155.138.218.106:9000
    ports:
      - "3000:3000"
    networks:
      - pantheon
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sandbox
      - frontend
    networks:
      - pantheon
    restart: unless-stopped

volumes:
  samples:
  db:

networks:
  pantheon:
    driver: bridge
