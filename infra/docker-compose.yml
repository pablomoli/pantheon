services:
  sandbox:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - samples:/tmp/samples
      - db:/app/data
    environment:
      - PANTHEON_DB_PATH=/app/data/pantheon.db
    networks:
      - internal
    env_file: ../.env
    restart: unless-stopped

