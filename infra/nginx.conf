server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ── WebSocket endpoint — MUST come before generic /sandbox ──
    location /ws {
        proxy_pass http://sandbox:9000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Event ingest (agents POST here) ──
    location /events {
        proxy_pass http://sandbox:9000/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Sandbox API ──
    location /sandbox/ {
        proxy_pass http://sandbox:9000/sandbox/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Telegram webhook ──
    location /telegram {
        proxy_pass http://sandbox:9000/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Dashboard (Next.js) ──
    location /dashboard {
        proxy_pass http://frontend:3000/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Next.js static assets ──
    location /_next/ {
        proxy_pass http://frontend:3000/_next/;
        proxy_set_header Host $host;
    }

    # ── Landing page (root) ──
    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
