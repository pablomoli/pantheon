server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /telegram {
        proxy_pass http://gateway:8000/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://gateway:8000/health;
    }
}
