<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pantheon — Voice Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --gold: #d4a843;
      --gold-light: #f0c040;
      --gold-dim: rgba(212, 168, 67, 0.12);
      --red: #e74c3c;
      --green: #2ecc71;
      --bg-primary: #0a0e14;
      --bg-card: #111820;
      --bg-elevated: #1a2230;
      --text-primary: #eaf0f6;
      --text-secondary: #6b7d93;
      --text-muted: #3d4f63;
      --border: rgba(212, 168, 67, 0.15);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    /* Subtle ambient glow at top */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(212,168,67,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== TOP BAR ========== */
    .topbar {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(10, 14, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--gold) 0%, #b8862d 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(212,168,67,0.2);
    }

    .topbar-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #timer {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #timer.visible { opacity: 1; color: var(--text-secondary); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .status-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .status-pill.connected { color: var(--green); background: rgba(46,204,113,0.08); }
    .status-pill.connected .dot { background: var(--green); animation: dot-blink 2s infinite; }
    .status-pill.error { color: var(--red); background: rgba(231,76,60,0.08); }
    .status-pill.error .dot { background: var(--red); }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ========== MAIN CONTENT ========== */
    .main {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* --- Compact agent header (collapses when messages arrive) --- */
    .agent-header {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 12px;
      transition: padding 0.4s ease, opacity 0.4s ease;
    }

    .agent-header.compact {
      padding: 10px 20px 8px;
    }

    .avatar-ring {
      position: relative;
      width: 80px; height: 80px;
      transition: width 0.4s ease, height 0.4s ease;
    }

    .agent-header.compact .avatar-ring {
      width: 48px; height: 48px;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid var(--border);
      transition: all 0.4s ease;
    }

    .avatar-ring.active::before {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212,168,67,0.25);
    }

    .avatar-ring.listening::before {
      border-color: var(--green);
      box-shadow: 0 0 20px rgba(46,204,113,0.25);
      animation: breathe 2s ease-in-out infinite;
    }

    .avatar-ring.speaking::before {
      border-color: var(--gold-light);
      box-shadow: 0 0 28px rgba(240,192,64,0.3);
      animation: speak-pulse 0.8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes speak-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a2538, #0f1722);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .avatar svg {
      width: 55%; height: 55%;
      transition: width 0.4s, height 0.4s;
    }

    .waveform {
      position: absolute;
      bottom: 12px;
      display: flex;
      align-items: flex-end;
      gap: 2.5px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .agent-header.compact .waveform { bottom: 6px; }

    .waveform.visible { opacity: 1; }

    .waveform .bar {
      width: 2.5px;
      background: var(--gold);
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }

    .waveform .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .waveform .bar:nth-child(2) { height: 11px; animation-delay: 0.15s; }
    .waveform .bar:nth-child(3) { height: 16px; animation-delay: 0.3s; }
    .waveform .bar:nth-child(4) { height: 11px; animation-delay: 0.45s; }
    .waveform .bar:nth-child(5) { height: 6px; animation-delay: 0.6s; }

    .agent-header.compact .waveform .bar:nth-child(1) { height: 4px; }
    .agent-header.compact .waveform .bar:nth-child(2) { height: 7px; }
    .agent-header.compact .waveform .bar:nth-child(3) { height: 10px; }
    .agent-header.compact .waveform .bar:nth-child(4) { height: 7px; }
    .agent-header.compact .waveform .bar:nth-child(5) { height: 4px; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    .agent-info {
      text-align: center;
      margin-top: 10px;
      transition: margin 0.4s ease;
    }

    .agent-header.compact .agent-info {
      margin-top: 6px;
    }

    .agent-name {
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .agent-header.compact .agent-name { font-size: 0.8rem; }

    .agent-subtitle {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 2px;
      transition: font-size 0.4s;
    }

    .agent-header.compact .agent-subtitle { font-size: 0.65rem; }

    /* ========== TRANSCRIPT ========== */
    .transcript-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Fade at top of transcript */
    .transcript-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 24px;
      background: linear-gradient(var(--bg-primary), transparent);
      z-index: 2;
      pointer-events: none;
    }

    /* Fade at bottom of transcript */
    .transcript-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 24px;
      background: linear-gradient(transparent, var(--bg-primary));
      z-index: 2;
      pointer-events: none;
    }

    #transcript {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 28px 20px;
      scroll-behavior: smooth;
    }

    /* Hide scrollbar on mobile for cleaner look */
    #transcript::-webkit-scrollbar { display: none; }
    #transcript { -ms-overflow-style: none; scrollbar-width: none; }

    .msg {
      margin-bottom: 10px;
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 0.83rem;
      line-height: 1.55;
      max-width: 85%;
      animation: msg-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg.agent {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
      margin-right: auto;
    }

    .msg.user {
      background: linear-gradient(135deg, rgba(212,168,67,0.14), rgba(212,168,67,0.06));
      border: 1px solid rgba(212,168,67,0.18);
      border-bottom-right-radius: 4px;
      margin-left: auto;
      text-align: right;
    }

    .msg .label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 3px;
    }

    .msg.agent .label { color: var(--gold); }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      margin-bottom: 10px;
      max-width: 70px;
    }

    .typing-indicator.visible { display: flex; }

    .typing-indicator span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.82rem;
      text-align: center;
      line-height: 1.6;
    }

    .empty-state .icon-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: rgba(212,168,67,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .empty-state svg { width: 24px; height: 24px; opacity: 0.35; }
    .empty-state .hint { margin-top: 6px; font-size: 0.72rem; color: var(--text-muted); }

    /* Scroll anchor — invisible element at bottom to scroll to */
    #scroll-anchor {
      flex: 0 0 0;
      height: 1px;
    }

    /* ========== BOTTOM CONTROLS ========== */
    .controls {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 24px calc(14px + var(--safe-bottom));
      background: rgba(10, 14, 20, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    #call-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: linear-gradient(145deg, var(--gold), #b8862d);
      box-shadow: 0 4px 20px rgba(212,168,67,0.3);
      -webkit-tap-highlight-color: transparent;
    }

    #call-btn:active { transform: scale(0.92); }

    #call-btn svg {
      width: 26px; height: 26px;
      fill: #0a0e14;
      transition: all 0.3s;
    }

    #call-btn.active {
      background: linear-gradient(145deg, var(--red), #c0392b);
      box-shadow: 0 4px 20px rgba(231,76,60,0.3);
      animation: btn-pulse 2s ease-in-out infinite;
    }

    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 4px 18px rgba(231,76,60,0.3), 0 0 0 0 rgba(231,76,60,0.15); }
      50% { box-shadow: 0 4px 18px rgba(231,76,60,0.3), 0 0 0 10px rgba(231,76,60,0); }
    }

    .btn-label {
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      min-width: 100px;
    }

    .btn-label.left { text-align: right; }
    .btn-label.right { text-align: left; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#0a0e14" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span class="topbar-title">Pantheon</span>
    </div>
    <div class="topbar-right">
      <span id="timer">00:00</span>
      <div class="status-pill" id="status-pill">
        <span class="dot"></span>
        <span id="status-text">Ready</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- Agent header — shrinks once messages appear -->
    <div class="agent-header" id="agent-header">
      <div class="avatar-ring" id="avatar-ring">
        <div class="avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          <div class="waveform" id="waveform">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
        </div>
      </div>
      <div class="agent-info">
        <div class="agent-name">Pantheon AI</div>
        <div class="agent-subtitle">Threat Intelligence Agent</div>
      </div>
    </div>

    <!-- Transcript -->
    <div class="transcript-wrap">
      <div id="transcript">
        <div class="empty-state" id="empty-state">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          </div>
          Start a voice call to speak<br>with the threat analysis agent
          <span class="hint">Your conversation will appear here</span>
        </div>
        <div class="typing-indicator" id="typing-indicator">
          <span></span><span></span><span></span>
        </div>
        <div id="scroll-anchor"></div>
      </div>
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="controls">
    <span class="btn-label left" id="btn-label">Tap to connect</span>
    <button id="call-btn" aria-label="Start voice call">
      <svg id="btn-icon-phone" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <svg id="btn-icon-stop" viewBox="0 0 24 24" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
    <span class="btn-label right" id="btn-label-right"></span>
  </div>

  <script type="module">
    const btn = document.getElementById('call-btn');
    const btnLabel = document.getElementById('btn-label');
    const statusPill = document.getElementById('status-pill');
    const statusText = document.getElementById('status-text');
    const transcriptEl = document.getElementById('transcript');
    const emptyState = document.getElementById('empty-state');
    const agentHeader = document.getElementById('agent-header');
    const avatarRing = document.getElementById('avatar-ring');
    const waveform = document.getElementById('waveform');
    const timerEl = document.getElementById('timer');
    const iconPhone = document.getElementById('btn-icon-phone');
    const iconStop = document.getElementById('btn-icon-stop');
    const typingIndicator = document.getElementById('typing-indicator');
    const scrollAnchor = document.getElementById('scroll-anchor');

    let conversation = null;
    let isActive = false;
    let timerInterval = null;
    let seconds = 0;
    let messageCount = 0;

    function scrollToBottom() {
      // Use multiple strategies for reliable mobile scrolling
      requestAnimationFrame(() => {
        scrollAnchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
        // Fallback: also set scrollTop directly
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      });
    }

    function setStatus(text, state = '') {
      statusText.textContent = text;
      statusPill.className = 'status-pill ' + state;
    }

    function startTimer() {
      seconds = 0;
      timerEl.classList.add('visible');
      timerEl.textContent = '00:00';
      timerInterval = setInterval(() => {
        seconds++;
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerEl.classList.remove('visible');
    }

    function setMode(mode) {
      avatarRing.className = 'avatar-ring';
      waveform.classList.remove('visible');
      typingIndicator.classList.remove('visible');

      if (mode === 'active') {
        avatarRing.classList.add('active');
      } else if (mode === 'listening') {
        avatarRing.classList.add('listening');
      } else if (mode === 'speaking') {
        avatarRing.classList.add('speaking');
        waveform.classList.add('visible');
        typingIndicator.classList.add('visible');
        scrollToBottom();
      }
    }

    function addMessage(role, text) {
      if (emptyState && emptyState.parentNode) emptyState.remove();
      messageCount++;

      // Compact the agent header after first message
      if (messageCount >= 1) {
        agentHeader.classList.add('compact');
      }

      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const label = role === 'user' ? 'You' : 'Pantheon';
      div.innerHTML = `<span class="label">${label}</span>${text}`;

      // Insert before the typing indicator and scroll anchor
      transcriptEl.insertBefore(div, typingIndicator);

      // Hide typing indicator after agent message
      if (role === 'agent') {
        typingIndicator.classList.remove('visible');
      }

      scrollToBottom();

      // Extra scroll after animation completes
      setTimeout(scrollToBottom, 350);
    }

    function setCallUI(active) {
      isActive = active;
      btn.classList.toggle('active', active);
      iconPhone.style.display = active ? 'none' : 'block';
      iconStop.style.display = active ? 'block' : 'none';
      btnLabel.textContent = active ? 'End call' : 'Tap to connect';
    }

    async function startCall() {
      setStatus('Connecting...', '');
      btnLabel.textContent = 'Connecting...';

      try {
        const resp = await fetch('/api/agent-config');
        const { agent_id } = await resp.json();
        if (!agent_id) {
          setStatus('Not configured', 'error');
          btnLabel.textContent = 'Tap to connect';
          return;
        }

        const { Conversation } = await import(
          'https://cdn.jsdelivr.net/npm/@11labs/client@latest/+esm'
        );

        await navigator.mediaDevices.getUserMedia({ audio: true });

        conversation = await Conversation.startSession({
          agentId: agent_id,
          onConnect: () => {
            setCallUI(true);
            setStatus('Connected', 'connected');
            setMode('active');
            startTimer();
          },
          onDisconnect: () => {
            setCallUI(false);
            setStatus('Ended', '');
            setMode('idle');
            stopTimer();
            conversation = null;
          },
          onMessage: ({ message, source }) => {
            if (message) {
              addMessage(source === 'user' ? 'user' : 'agent', message);
            }
          },
          onError: (error) => {
            console.error('ElevenLabs error:', error);
            setStatus(error.message || 'Error', 'error');
          },
          onModeChange: ({ mode }) => {
            if (mode === 'listening') {
              setStatus('Listening', 'connected');
              setMode('listening');
            } else if (mode === 'speaking') {
              setStatus('Speaking', 'connected');
              setMode('speaking');
            }
          },
        });
      } catch (err) {
        console.error(err);
        setStatus(err.message || 'Failed', 'error');
        setCallUI(false);
        setMode('idle');
      }
    }

    async function endCall() {
      if (conversation) {
        try { await conversation.endSession(); } catch (e) { /* ok */ }
      }
      setCallUI(false);
      setStatus('Ended', '');
      setMode('idle');
      stopTimer();
      conversation = null;
    }

    btn.addEventListener('click', () => {
      if (isActive) { endCall(); } else { startCall(); }
    });

    // Telegram Mini App setup
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tg.ready();
      tg.disableVerticalSwipes();
      // Match Telegram theme if available
      if (tg.themeParams && tg.themeParams.bg_color) {
        document.documentElement.style.setProperty(
          '--bg-primary', tg.themeParams.bg_color
        );
      }
    }

    // Prevent iOS bounce/rubber-band on the body
    document.body.addEventListener('touchmove', (e) => {
      if (e.target.closest('#transcript')) return;
      e.preventDefault();
    }, { passive: false });

    // Set correct viewport height on mobile (accounts for browser chrome)
    function setVH() {
      document.documentElement.style.setProperty(
        '--vh', window.innerHeight + 'px'
      );
      document.body.style.height = window.innerHeight + 'px';
    }
    setVH();
    window.addEventListener('resize', setVH);
  </script>
</body>
</html>
