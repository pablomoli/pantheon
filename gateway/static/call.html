<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pantheon — Voice Call</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: #f0c040;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 32px;
    }
    #call-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #f0c040;
      background: rgba(240, 192, 64, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 48px;
    }
    #call-btn:hover { background: rgba(240, 192, 64, 0.2); }
    #call-btn.active {
      border-color: #f85149;
      background: rgba(248, 81, 73, 0.15);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(248, 81, 73, 0); }
    }
    #status {
      margin-top: 24px;
      font-size: 0.9rem;
      color: #8b949e;
      text-align: center;
      min-height: 1.2em;
    }
    #transcript {
      margin-top: 24px;
      width: 100%;
      max-width: 400px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.82rem;
      line-height: 1.5;
      color: #c9d1d9;
    }
    .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; }
    .msg.user { background: #1c2333; text-align: right; }
    .msg.agent { background: #1a2a1a; }
    .msg .label { font-size: 0.7rem; color: #8b949e; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
  <h1>Pantheon</h1>
  <p class="subtitle">Tap to speak with the AI agent</p>

  <button id="call-btn">&#128222;</button>
  <div id="status">Ready</div>
  <div id="transcript"></div>

  <script type="module">
    const btn = document.getElementById('call-btn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    let conversation = null;
    let isActive = false;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<span class="label">${role === 'user' ? 'You' : 'Pantheon'}</span>${text}`;
      transcriptEl.appendChild(div);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    async function startCall() {
      setStatus('Connecting...');
      try {
        // Fetch agent config from our backend.
        const resp = await fetch('/api/agent-config');
        const { agent_id } = await resp.json();
        if (!agent_id) {
          setStatus('Error: No agent configured');
          return;
        }

        // Dynamically import the ElevenLabs client SDK.
        const { Conversation } = await import(
          'https://cdn.jsdelivr.net/npm/@11labs/client@latest/+esm'
        );

        // Request mic permission.
        await navigator.mediaDevices.getUserMedia({ audio: true });

        conversation = await Conversation.startSession({
          agentId: agent_id,
          onConnect: () => {
            setStatus('Connected — speak now');
            btn.classList.add('active');
            btn.innerHTML = '&#9724;';
            isActive = true;
          },
          onDisconnect: () => {
            setStatus('Call ended');
            btn.classList.remove('active');
            btn.innerHTML = '&#128222;';
            isActive = false;
            conversation = null;
          },
          onMessage: ({ message, source }) => {
            if (source === 'ai' && message) {
              addMessage('agent', message);
            }
          },
          onError: (error) => {
            console.error('ElevenLabs error:', error);
            setStatus('Error: ' + (error.message || 'Connection failed'));
          },
          onModeChange: ({ mode }) => {
            if (mode === 'listening') {
              setStatus('Listening...');
            } else if (mode === 'speaking') {
              setStatus('Pantheon is speaking...');
            }
          },
        });
      } catch (err) {
        console.error(err);
        setStatus('Error: ' + (err.message || 'Failed to start'));
        btn.classList.remove('active');
        btn.innerHTML = '&#128222;';
        isActive = false;
      }
    }

    async function endCall() {
      if (conversation) {
        try {
          await conversation.endSession();
        } catch (e) {
          console.warn('End session error:', e);
        }
      }
      btn.classList.remove('active');
      btn.innerHTML = '&#128222;';
      isActive = false;
      conversation = null;
      setStatus('Call ended');
    }

    btn.addEventListener('click', () => {
      if (isActive) {
        endCall();
      } else {
        startCall();
      }
    });

    // If running inside Telegram Mini App, expand to full height.
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.ready();
    }
  </script>
</body>
</html>
